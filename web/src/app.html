<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta name="color-scheme" content="dark light" />
    <title>GoGrab</title>
    <script>
      // Apply the stored theme (or prefers-color-scheme fallback) before
      // first paint to avoid the dark→light flash on page load.
      (function () {
        try {
          var t = localStorage.getItem('gograb-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="margin:0;font-family:Geist,ui-sans-serif,system-ui,sans-serif;">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
