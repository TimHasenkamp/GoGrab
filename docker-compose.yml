# GoGrab production compose. Works out-of-the-box behind any Traefik that
# has a certresolver named via TRAEFIK_CERTRESOLVER (default "letsencrypt")
# and an external "proxy" network.
#
# Authentication is built into the app: visit /admin/signup once to create
# your operator account, then /admin/login to come back. No external IDP.

services:
  app:
    # Pulled from GHCR by the deploy workflow. Override IMAGE_TAG to deploy a
    # specific sha-XXXXXXX revision instead of the rolling :main pointer.
    image: ghcr.io/timhasenkamp/gograb:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOGRAB_LISTEN_ADDR: ":8080"
      GOGRAB_PUBLIC_BASE_URL: "https://${GOGRAB_HOST:?GOGRAB_HOST required}"
      GOGRAB_LOG_LEVEL: "${GOGRAB_LOG_LEVEL:-info}"
      GOGRAB_DATABASE_URL: "postgres://gograb:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/gograb?sslmode=disable"
      GOGRAB_MIGRATE_ON_BOOT: "1"
      GOGRAB_DEFAULT_TTL_HOURS: "72"
      GOGRAB_MAX_CIPHERTEXT_BYTES: "65536"
      GOGRAB_RATE_PER_MIN: "20"
      GOGRAB_RATE_BURST: "5"
      GOGRAB_NOTIFY_WEBHOOK_URL: "${GOGRAB_NOTIFY_WEBHOOK_URL:-}"
      GOGRAB_NOTIFY_WEBHOOK_TIMEOUT_SECONDS: "5"
      GOGRAB_RP_DISPLAY_NAME: "${GOGRAB_RP_DISPLAY_NAME:-GoGrab}"
      GOGRAB_RP_ID: "${GOGRAB_HOST}"
      GOGRAB_RP_ORIGINS: "https://${GOGRAB_HOST}"
      GOGRAB_SESSION_SECRET: "${GOGRAB_SESSION_SECRET:?GOGRAB_SESSION_SECRET required (32 bytes base64url)}"
      # Self-signup is on by default. Set to false once you've created the
      # accounts you want — locks down /admin/signup without breaking login
      # for existing accounts or the ability to register additional Authenticators.
      GOGRAB_SIGNUP_ENABLED: "${GOGRAB_SIGNUP_ENABLED:-true}"
      GOGRAB_SIGNUP_RATE_PER_HOUR: "${GOGRAB_SIGNUP_RATE_PER_HOUR:-3}"
      GOGRAB_COOKIE_SECURE: "1"
      GOGRAB_BRAND_NAME: "${GOGRAB_BRAND_NAME:-GoGrab}"
      GOGRAB_BRAND_LOGO_URL: "${GOGRAB_BRAND_LOGO_URL:-}"
      GOGRAB_BRAND_COLOR: "${GOGRAB_BRAND_COLOR:-}"
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # One router for the whole host. The Go app gates /admin and
      # /api/admin internally via its session cookie — no external
      # forward-auth middleware needed.
      - "traefik.http.routers.gograb.rule=Host(`${GOGRAB_HOST:?GOGRAB_HOST required}`)"
      - "traefik.http.routers.gograb.entrypoints=websecure"
      - "traefik.http.routers.gograb.tls=true"
      - "traefik.http.routers.gograb.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.gograb.loadbalancer.server.port=8080"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gograb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gograb}
      POSTGRES_DB: ${POSTGRES_DB:-gograb}
    volumes:
      - gograb-pg:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gograb} -d ${POSTGRES_DB:-gograb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gograb-pg:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
