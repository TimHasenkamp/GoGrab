# GoGrab production compose. Designed to work out-of-the-box behind any
# Traefik that has a certresolver named via TRAEFIK_CERTRESOLVER (default
# "letsencrypt") and an external "proxy" network.
#
# Forward-auth middleware (Authentik, Authelia, oauth2-proxy, …) is
# OPTIONAL: set TRAEFIK_AUTH_MIDDLEWARE to its name to gate /admin/* with
# it. Leave it empty to run /admin/* unauthenticated — only safe if you
# also set GOGRAB_DEV_USER (or wire some other auth in front).

services:
  app:
    # Pulled from GHCR by the deploy workflow. Override IMAGE_TAG to deploy a
    # specific sha-XXXXXXX revision instead of the rolling :main pointer.
    image: ghcr.io/timhasenkamp/gograb:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOGRAB_LISTEN_ADDR: ":8080"
      GOGRAB_PUBLIC_BASE_URL: "https://${GOGRAB_HOST:?GOGRAB_HOST required}"
      GOGRAB_LOG_LEVEL: "${GOGRAB_LOG_LEVEL:-info}"
      GOGRAB_TRUSTED_PROXY: "1"
      GOGRAB_TRUSTED_PROXY_CIDRS: "${GOGRAB_TRUSTED_PROXY_CIDRS:-172.16.0.0/12,127.0.0.0/8}"
      GOGRAB_DATABASE_URL: "postgres://gograb:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/gograb?sslmode=disable"
      GOGRAB_MIGRATE_ON_BOOT: "1"
      GOGRAB_DEFAULT_TTL_HOURS: "72"
      GOGRAB_MAX_CIPHERTEXT_BYTES: "65536"
      GOGRAB_RATE_PER_MIN: "20"
      GOGRAB_RATE_BURST: "5"
      GOGRAB_NOTIFY_WEBHOOK_URL: "${GOGRAB_NOTIFY_WEBHOOK_URL:-}"
      GOGRAB_NOTIFY_WEBHOOK_TIMEOUT_SECONDS: "5"
      GOGRAB_RP_DISPLAY_NAME: "${GOGRAB_RP_DISPLAY_NAME:-GoGrab}"
      GOGRAB_RP_ID: "${GOGRAB_HOST}"
      GOGRAB_RP_ORIGINS: "https://${GOGRAB_HOST}"
      GOGRAB_SESSION_SECRET: "${GOGRAB_SESSION_SECRET:?GOGRAB_SESSION_SECRET required (32 bytes base64url)}"
      GOGRAB_BRAND_NAME: "${GOGRAB_BRAND_NAME:-GoGrab}"
      GOGRAB_BRAND_LOGO_URL: "${GOGRAB_BRAND_LOGO_URL:-}"
      GOGRAB_BRAND_COLOR: "${GOGRAB_BRAND_COLOR:-}"
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # Router 1: admin surface — gated by the forward-auth middleware named
      # in TRAEFIK_AUTH_MIDDLEWARE (e.g. "authentik@docker"). When the env
      # is empty the middlewares label evaluates to nothing and Traefik
      # applies no middleware → /admin/* is open. Combine with
      # GOGRAB_DEV_USER (or roll your own auth) if that's the chosen mode.
      - "traefik.http.routers.gograb-admin.rule=Host(`${GOGRAB_HOST:?GOGRAB_HOST required}`) && (PathPrefix(`/admin`) || PathPrefix(`/api/admin`))"
      - "traefik.http.routers.gograb-admin.entrypoints=websecure"
      - "traefik.http.routers.gograb-admin.tls=true"
      - "traefik.http.routers.gograb-admin.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.gograb-admin.middlewares=${TRAEFIK_AUTH_MIDDLEWARE:-}"
      - "traefik.http.routers.gograb-admin.service=gograb"

      # Router 2: public surface — no auth, hits /r/* and /api/requests/*
      - "traefik.http.routers.gograb-public.rule=Host(`${GOGRAB_HOST}`)"
      - "traefik.http.routers.gograb-public.entrypoints=websecure"
      - "traefik.http.routers.gograb-public.tls=true"
      - "traefik.http.routers.gograb-public.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.gograb-public.priority=10"
      - "traefik.http.routers.gograb-public.service=gograb"

      - "traefik.http.services.gograb.loadbalancer.server.port=8080"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gograb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gograb}
      POSTGRES_DB: ${POSTGRES_DB:-gograb}
    volumes:
      - gograb-pg:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gograb} -d ${POSTGRES_DB:-gograb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gograb-pg:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
