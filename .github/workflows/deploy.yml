name: Deploy

# Listens for the CI workflow finishing on main. If CI succeeded AND the
# triggering commit message contains `[deploy]`, builds + pushes the image
# and SSH-deploys it to prod. Any other case (CI red, no `[deploy]` flag,
# wrong branch) is a no-op.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy (default: latest main)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    # Gate 1: CI was successful (workflow_run path) OR manually dispatched.
    # Gate 2: commit message contains [deploy] (workflow_run path only).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       contains(github.event.workflow_run.head_commit.message, '[deploy]'))
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - name: Resolve deploy SHA
        id: sha
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            SHA="${{ inputs.sha }}"
          elif [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short=$(echo "$SHA" | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Lowercase repo path (GHCR requires it)
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ steps.repo.outputs.name }}:main
          labels: |
            org.opencontainers.image.revision=${{ steps.sha.outputs.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/gograb
            echo "→ Pulling ghcr.io/${{ steps.repo.outputs.name }}:sha-${{ steps.sha.outputs.short }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "→ Deployed sha-${{ steps.sha.outputs.short }}"

      - name: Summary
        run: |
          echo "## Deployed sha-${{ steps.sha.outputs.short }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`ghcr.io/${{ steps.repo.outputs.name }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
